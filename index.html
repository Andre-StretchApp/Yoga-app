<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Diagnostique</title>
  <style>
    body { 
      background-color: #121214; 
      color: #ffffff; 
      font-family: sans-serif; 
      padding: 20px; 
      text-align: center; 
    }
    button { 
      background-color: #3b82f6; 
      color: white; 
      border: none; 
      padding: 15px 30px; 
      font-size: 18px; 
      border-radius: 8px; 
      cursor: pointer; 
      margin-bottom: 20px;
      width: 100%;
    }
    #resultat { 
      background-color: #1e1e22; 
      padding: 15px; 
      border-radius: 8px; 
      text-align: left; 
      font-family: monospace; 
      font-size: 14px; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
      min-height: 100px;
    }
    .succes { color: #16a34a; font-weight: bold; }
    .erreur { color: #f87171; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Test de Survie JavaScript</h2>
  <p>Si tu vois ce texte, la page web se charge.</p>
  
  <button id="btn-test" onclick="lancerDiagnostique()">Cliquer ici pour tester</button>
  
  <div id="resultat">Si ce texte ne change pas tout seul d'ici 2 secondes, ton JavaScript est COMPLÈTEMENT BLOQUÉ.</div>

  <script>
    // 1. Test immédiat au chargement de la page
    // Si JavaScript fonctionne un minimum, ce texte va s'afficher tout seul sans cliquer.
    document.getElementById('resultat').innerText = "✅ JavaScript est bien chargé et attend ton clic sur le bouton bleu.";

    // 2. La fonction liée au bouton
    function lancerDiagnostique() {
      const zoneResultat = document.getElementById('resultat');
      let rapport = "<span class='succes'>✅ Le bouton répond aux clics !</span>\n\n";

      // Test de la mémoire locale (La cause #1 des plantages invisibles sur mobile)
      try {
        localStorage.setItem('test_memoire', 'ok');
        const testVal = localStorage.getItem('test_memoire');
        if (testVal === 'ok') {
          rapport += "<span class='succes'>✅ Mémoire locale (localStorage) : ACCESSIBLE.</span>\n";
          localStorage.removeItem('test_memoire');
        } else {
          rapport += "<span class='erreur'>❌ Mémoire locale : ÉCHEC DE LECTURE.</span>\n";
        }
      } catch (e) {
        rapport += `<span class='erreur'>❌ Mémoire locale BLOQUÉE par le navigateur. Erreur : ${e.message}</span>\n`;
      }

      // Affichage des informations du navigateur pour voir ce qui l'exécute
      rapport += `\nEnvironnement détecté :\n${navigator.userAgent}`;

      zoneResultat.innerHTML = rapport;
    }
  </script>
</body>
</html>
